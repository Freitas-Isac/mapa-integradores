<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolarZ — Mapa de Integradores</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body data-theme="light">

<div id="loading">
  <div class="loader-ring"></div>
  <p>Carregando integradores…</p>
</div>

<div id="header">
  <div class="logo">
    <div class="logo-icon">S</div>
    <span class="logo-text">Solar<strong>Z</strong></span>
  </div>

  <div class="header-sep"></div>

  <span class="header-label">Mapa de Integradores · <em>Planos Ativos</em></span>

  <div class="header-spacer"></div>

  <div class="search-wrap">
    <svg class="search-ico" viewBox="0 0 20 20" fill="none">
      <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8"/>
      <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    <input id="city-input" type="text" placeholder="Buscar cidade…" autocomplete="off" spellcheck="false"/>
    <button id="search-clear" class="search-clear" title="Limpar">✕</button>
  </div>

  <div class="filters">
    <button class="btn-f outros active" data-f="outros">Outros</button>
    <button class="btn-f burn active" data-f="burn">🔥 Burn</button>
    <button class="btn-f burnplus active" data-f="burnplus">⚡ Burn+</button>
  </div>

  <div class="header-sep"></div>

  <div class="plan-filter-wrap">
    <select id="plan-filter" class="plan-select">
      <option value="">Filtrar por plano…</option>
    </select>
    <button id="plan-filter-clear" class="plan-clear" title="Limpar filtro" style="display:none">✕</button>
  </div>

  <button id="tree-btn" class="btn-theme" title="Painel de regiões" onclick="toggleTreePanel()">&#9776;</button>
  <button id="theme-btn" class="btn-theme" title="Alternar tema">🌙</button>
</div>

<div id="main">
  <div id="sidebar">
    <div id="stats">
      <div class="s-card">
        <span class="s-lbl">Visíveis</span>
        <span class="s-val orange" id="sv">—</span>
      </div>
      <div class="s-card">
        <span class="s-lbl">Burn</span>
        <span class="s-val orange" id="sb">—</span>
      </div>
      <div class="s-card">
        <span class="s-lbl">Burn+</span>
        <span class="s-val purple" id="sp">—</span>
      </div>
      <div class="s-card">
        <span class="s-lbl">Outros</span>
        <span class="s-val gray" id="so">—</span>
      </div>
      <div class="s-card">
        <span class="s-lbl">Total</span>
        <span class="s-val" id="st">—</span>
      </div>
    </div>

    <div id="detail">
      <div class="empty-state" id="empty">
        <div class="empty-ico">📍</div>
        <p>Clique em um marcador<br>para ver os detalhes.</p>
      </div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="city-toast"></div>

    <div id="city-panel">
      <div id="city-panel-head">
        <span id="city-panel-title">—</span>
        <button id="city-panel-close" onclick="closeCityPanel()" title="Fechar">✕</button>
      </div>
      <div id="city-panel-cards"></div>
    </div>
  </div>

  <div id="tree-panel" style="display:none">
    <div class="tp-head">
      <span class="tp-title">Regiões</span>
      <button class="tp-close" onclick="toggleTreePanel()" title="Recolher">‹</button>
    </div>
    <div class="tp-search-wrap">
      <svg class="tp-search-ico" viewBox="0 0 20 20" fill="none">
        <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8"/>
        <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <input id="tree-search" type="text" placeholder="Buscar cidade ou empresa…" autocomplete="off" spellcheck="false"/>
      <button id="tree-search-clear" class="tp-search-clear" title="Limpar">✕</button>
    </div>
    <div id="tree-content" class="tp-content"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
